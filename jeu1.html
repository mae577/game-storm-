<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Space Shooter</title>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:Arial;
  overflow:hidden;
}

h1{
  color:white;
  text-shadow:0 0 10px cyan;
}

canvas{
  background:black;
  border:4px solid #111;
  box-shadow:0 0 30px cyan;
  max-width:95vw;
  max-height:70vh;
}

#controls{
  margin-top:20px;
  display:flex;
  gap:20px;
}

.controlBtn{
  background:#00aaff;
  color:white;
  font-size:25px;
  border:none;
  border-radius:10px;
  padding:15px 20px;
}

.controlBtn:active{
  transform:scale(0.9);
}

/* bouton aide */
.helpBtn{
  margin-top:15px;
  background:cyan;
  border:none;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
}

/* popup tuto */
#controlsModal{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  color:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 20px cyan;
  text-align:center;
  width:280px;
}

#controlsModal button{
  margin:5px;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.nextBtn{
  background:cyan;
}

.skipBtn{
  background:red;
  color:white;
}

/* GAME OVER */
#gameOverModal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modalBox{
  background:#1f57c3;
  padding:30px;
  border-radius:15px;
  text-align:center;
  color:white;
  width:300px;
}
</style>
</head>

<body>

<h1>🚀 Space Shooter</h1>
<canvas id="game"></canvas>

<div id="controls">
  <button class="controlBtn" onclick="moveLeft()">⬅</button>
  <button class="controlBtn" onclick="shoot()">🔫</button>
  <button class="controlBtn" onclick="moveRight()">➡</button>
</div>

<button class="helpBtn" onclick="openControls()">🎮 Touches</button>

<!-- 🎮 TUTORIEL -->
<div id="controlsModal">
  <h2>🎮 Tutoriel</h2>
  <p id="tutoText"></p>
  <button class="nextBtn" onclick="nextTuto()">Suivant</button>
  <button class="skipBtn" onclick="closeControls()">Passer</button>
</div>

<div id="gameOverModal">
  <div class="modalBox">
    <h2>Game Over</h2>
    <p>⭐ Score : <span id="finalScore">0</span></p>
    <p>🏆 Record : <span id="finalRecord">0</span></p>
    <button onclick="restartGame()">▶ Rejouer</button>
    <button onclick="home()">🏠 Accueil</button>
  </div>
</div>

<audio id="shootSound" src="shoot.mp3"></audio>
<audio id="explosionSound" src="explosion.mp3"></audio>
<audio id="gameOverSound" src="gameover.mp3"></audio>
const ctx = canvas.getContext("2d");
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* 🎮 TUTO */
let step = 0;
let tutoSteps = [
  "⬅️ ➡️ Utilise les flèches pour bouger",
  "🔫 Appuie sur ESPACE pour tirer",
  "🚀 Évite les ennemis",
  "💥 Détruis-les pour gagner des points"
];

function openControls(){
  step = 0;
  document.getElementById("controlsModal").style.display="block";
  updateTuto();
}

function updateTuto(){
  document.getElementById("tutoText").textContent = tutoSteps[step];
}

function nextTuto(){
  step++;
  if(step < tutoSteps.length){
    updateTuto();
  }else{
    closeControls();
  }
}

function closeControls(){
  document.getElementById("controlsModal").style.display="none";
}

/* ouverture auto */
window.onload = () => {
  setTimeout(openControls, 500);
};

/* IMAGES */
let shipImg = new Image();
let shipLoaded = false;
shipImg.src = "vaise.png";
shipImg.onload = () => shipLoaded = true;

let enemyImg = new Image();
let enemyLoaded = false;
enemyImg.src = "vaisseau-spatial-fond-transparent-illustration-rendu-3d_494250-21606.jpg";
enemyImg.onload = () => enemyLoaded = true;

/* TAILLE */
let size = Math.min(window.innerWidth*0.9,500);
canvas.width = size;
canvas.height = size;

/* JOUEUR */
let player={
  x:size/2-25,
  y:size-80,
  speed:6
};

let bullets=[];
let enemies=[];
let explosions=[];
let stars=[];
let score=0;
let record=localStorage.getItem("spaceRecord") || 0;

/* étoiles */
for(let i=0;i<80;i++){
  stars.push({
    x:Math.random()*size,
    y:Math.random()*size,
    speed:1+Math.random()*2
  });
}

/* contrôles */
let left=false;
let right=false;

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") left=true;
  if(e.key==="ArrowRight") right=true;
  if(e.code==="Space") shoot();
});

document.addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft") left=false;
  if(e.key==="ArrowRight") right=false;
});

/* mobile */
function moveLeft(){ player.x-=40; }
function moveRight(){ player.x+=40; }

/* tir */
function shoot(){
  bullets.push({ x:player.x+22, y:player.y });

  shootSound.currentTime = 0;
  shootSound.play();
}
/* update */
function update(){

  if(left) player.x-=player.speed;
  if(right) player.x+=player.speed;

  if(player.x<0) player.x=0;
  if(player.x>canvas.width-50) player.x=canvas.width-50;

  stars.forEach(s=>{
    s.y+=s.speed;
    if(s.y>size){
      s.y=0;
      s.x=Math.random()*size;
    }
  });

  if(Math.random()<0.02+score*0.00005){
    enemies.push({
      x:Math.random()*(size-40),
      y:-40,
      speed:2+score*0.02
    });
  }

  bullets.forEach(b=> b.y-=10);

  enemies.forEach(e=>{
    e.y+=e.speed;

    if(
      player.x < e.x+40 &&
      player.x+50 > e.x &&
      player.y < e.y+40 &&
      player.y+50 > e.y
    ){
      gameOver();
    }
  });

  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      if(
        b.x < e.x+40 &&
        b.x+5 > e.x &&
        b.y < e.y+40 &&
        b.y+10 > e.y
      ){
        explosions.push({ x:e.x+20, y:e.y+20, size:5 });
        enemies.splice(ei,1);
        bullets.splice(bi,1);
        score+=10;
      }
    });
  });

  explosions.forEach(ex=> ex.size+=2);

  bullets=bullets.filter(b=>b.y>0);
  enemies=enemies.filter(e=>e.y<size);
  explosions=explosions.filter(e=>e.size<30);
}

function shakeScreen(){
  canvas.style.transform = "translate(5px, 5px)";
  
  setTimeout(()=>{
    canvas.style.transform = "translate(-5px, -5px)";
  }, 50);

  setTimeout(()=>{
    canvas.style.transform = "none";
  }, 100);
}

/* draw */
function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,size,size);

  ctx.fillStyle="white";
  stars.forEach(s=> ctx.fillRect(s.x,s.y,2,2));

  if(shipLoaded){
    ctx.drawImage(shipImg, player.x, player.y, 50, 50);
  }else{
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x, player.y, 40, 40);
  }

  ctx.fillStyle="yellow";
  bullets.forEach(b=> ctx.fillRect(b.x,b.y,4,10));

  enemies.forEach(e=>{
    if(enemyLoaded){
      ctx.drawImage(enemyImg, e.x, e.y, 40, 40);
    }else{
      ctx.fillStyle="red";
      ctx.fillRect(e.x,e.y,30,30);
    }
  });

  ctx.strokeStyle="orange";
  explosions.forEach(ex=>{
    ctx.beginPath();
    ctx.arc(ex.x,ex.y,ex.size,0,Math.PI*2);
    ctx.stroke();
  });

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Score : "+score,10,25);
  ctx.fillText("🏆 "+record,size-120,25);
}

/* game over */
function gameOver(){
  if(score>record){
    record=score;
    localStorage.setItem("spaceRecord",record);
  }

  document.getElementById("finalScore").innerText=score;
  document.getElementById("finalRecord").innerText=record;
  document.getElementById("gameOverModal").style.display="flex";
}

/* restart */
function restartGame(){
  player.x=size/2-25;
  bullets=[];
  enemies=[]
  explosions=[];
  score=0;
  document.getElementById("gameOverModal").style.display="none";
}

/* home */
function home(){
  window.location.href="selection.html";
}

/* loop */
function gameLoop(){
  update();
  draw();
}

setInterval(gameLoop,30);
</script>

</body>
</html>
