<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>

<style>
body{
  margin:0;
  background:linear-gradient(#1b5e20,#4caf50);
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:Arial;
}

h1{
  color:white;
  text-shadow:0 0 10px black;
}

canvas{
  background:#2e7d32;
  border:5px solid #1b5e20;
  box-shadow:0 0 20px black;
  max-width:95vw;
  max-height:70vh;
}

#controls{
  margin-top:20px;
  display:grid;
  grid-template-columns:70px 70px 70px;
  grid-template-rows:70px 70px;
  gap:10px;
}

.controlBtn{
  background:#1f57c3;
  color:white;
  font-size:28px;
  border:none;
  border-radius:10px;
}

.controlBtn:active{
  transform:scale(0.9);
}

#gameOverModal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modalBox{
  background:#4ea5cf;
  padding:30px;
  border-radius:15px;
  text-align:center;
  color:white;
  width:300px;
}

.modalBox button{
  margin:10px;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  background:#1f57c3;
  color:white;
}
</style>
</head>

<body>

<h1>🐍 Snake Game</h1>
<canvas id="game"></canvas>

<div id="controls">
  <div></div>
  <button class="controlBtn" onclick="up()">⬆</button>
  <div></div>
  <button class="controlBtn" onclick="left()">⬅</button>
  <button class="controlBtn" onclick="down()">⬇</button>
  <button class="controlBtn" onclick="right()">➡</button>
</div>

<div id="gameOverModal">
  <div class="modalBox">
    <h2>Game Over</h2>
    <p>🍎 Score : <span id="finalScore">0</span></p>
    <p>🏆 Record : <span id="finalRecord">0</span></p>
    <button onclick="restartGame()">▶ Rejouer</button>
    <button onclick="home()">🏠 Accueil</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* TAILLE */
let size = Math.min(window.innerWidth*0.9,500);
canvas.width = size;
canvas.height = size;
const grid = Math.floor(size/25);

/* SCORE */
let score = 0;
let record = localStorage.getItem("snakeRecord") || 0;

/* SERPENT */
let snake = [
  {x:grid*12,y:grid*12},
  {x:grid*11,y:grid*12},
  {x:grid*10,y:grid*12}
];

let dx = grid;
let dy = 0;

/* POMME */
let apple = {
  x:grid*5,
  y:grid*5
};

/* 🎮 CONTROLES ZQSD */
document.addEventListener("keydown",function(e){

  if((e.key==="z"||e.key==="Z") && dy===0){
    dx=0; dy=-grid;
  }

  if((e.key==="s"||e.key==="S") && dy===0){
    dx=0; dy=grid;
  }

  if((e.key==="q"||e.key==="Q") && dx===0){
    dx=-grid; dy=0;
  }

  if((e.key==="d"||e.key==="D") && dx===0){
    dx=grid; dy=0;
  }

});

/* MOBILE */
function up(){ if(dy===0){ dx=0; dy=-grid; } }
function down(){ if(dy===0){ dx=0; dy=grid; } }
function left(){ if(dx===0){ dx=-grid; dy=0; } }
function right(){ if(dx===0){ dx=grid; dy=0; } }

/* UPDATE */
function update(){
  let head = {
    x:snake[0].x + dx,
    y:snake[0].y + dy
  };

  if(
    head.x<0 || head.y<0 ||
    head.x>=canvas.width ||
    head.y>=canvas.height
  ){
    gameOver();
    return;
  }

  for(let part of snake){
    if(head.x===part.x && head.y===part.y){
      gameOver();
      return;
    }
  }

  snake.unshift(head);

  if(head.x===apple.x && head.y===apple.y){
    score++;
    apple.x=Math.floor(Math.random()*25)*grid;
    apple.y=Math.floor(Math.random()*25)*grid;
  }else{
    snake.pop();
  }
}

/* DESSIN */
function draw(){
  ctx.fillStyle="#2e7d32";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  /* grille */
  ctx.strokeStyle="#388e3c";
  for(let i=0;i<canvas.width;i+=grid){
    ctx.beginPath();
    ctx.moveTo(i,0);
    ctx.lineTo(i,canvas.height);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,i);
    ctx.lineTo(canvas.width,i);
    ctx.stroke();
  }

  /* pomme */
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(apple.x+grid/2,apple.y+grid/2,grid/2-2,0,Math.PI*2);
  ctx.fill();

  /* serpent */
  snake.forEach((part,index)=>{
    ctx.fillStyle = index===0 ? "#00ff90" : "#00e676";
    ctx.beginPath();
    ctx.arc(part.x+grid/2,part.y+grid/2,grid/2-1,0,Math.PI*2);
    ctx.fill();
  });

  /* score */
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Score : "+score,10,25);
  ctx.fillText("🏆 "+record,canvas.width-120,25);
}

/* GAME OVER */
function gameOver(){
  if(score > record){
    record = score;
    localStorage.setItem("snakeRecord",record);
  }

  document.getElementById("finalScore").innerText = score;
  document.getElementById("finalRecord").innerText = record;
  document.getElementById("gameOverModal").style.display="flex";
}

/* RESTART */
function restartGame(){
  snake=[
    {x:grid*12,y:grid*12},
    {x:grid*11,y:grid*12},
    {x:grid*10,y:grid*12}
  ];
  dx=grid;
  dy=0;
  score=0;
  document.getElementById("gameOverModal").style.display="none";
}

/* HOME */
function home(){
  window.location.href="selection.html";
}

/* LOOP */
function gameLoop(){
  update();
  draw();
}

setInterval(gameLoop,100);
</script>

</body>
</html>
