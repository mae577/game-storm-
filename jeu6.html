<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Escape Run</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

/* UI */
#scoreUI{
  position:absolute;
  top:10px;
  left:10px;
  font-size:20px;
}

#backBtn{
  position:absolute;
  top:10px;
  right:10px;
  padding:8px 15px;
  background:#00ffff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

canvas{
  display:block;
  margin:auto;
  background:#111;
}

/* GAME OVER */
#gameOverMenu{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:30px;
  border-radius:15px;
  box-shadow:0 0 20px #00ffff;
  text-align:center;
}
</style>
</head>

<body>

<div id="scoreUI">Score : 0</div>
<button id="backBtn" onclick="window.location.href='selection.html'">⬅ Retour</button>

<canvas id="game" width="400" height="600"></canvas>

<div id="gameOverMenu">
  <h2>💀 GAME OVER</h2>
  <p>Score : <span id="finalScore">0</span></p>
  <p>Record : <span id="finalRecord">0</span></p>
  <button onclick="startGame()">🔁 Rejouer</button>
  <br><br>
  <button onclick="window.location.href='selection.html'">🏠 Accueil</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let dinoImg = new Image();
dinoImg.src = "mini-dino.png";

let player, obstacles, clouds, score, gameRunning, frame;
let gravity = 0.6;
let record = localStorage.getItem("dinoRecord") || 0;

/* START */
function startGame(){
  document.getElementById("gameOverMenu").style.display="none";

  player = {x:80,y:450,w:60,h:60,vy:0,jumping:false};
  obstacles = [];
  clouds = [];
  score = 0;
  frame = 0;
  gameRunning = true;

  document.getElementById("scoreUI").innerText="Score : 0";

  loop();
}

/* CONTROLES */
window.addEventListener("keydown", e=>{
  if((e.code==="Space" || e.key==="z" || e.key==="Z") && !player.jumping){
    player.vy = -12;
    player.jumping = true;
  }
});

/* OBSTACLES */
function createObstacle(){
  obstacles.push({
    x:400,
    y:500,
    w:20,
    h:40,
    type:"cactus"
  });
}

/* NUAGES */
function createCloud(){
  clouds.push({
    x:400,
    y:Math.random()*200,
    size:30 + Math.random()*20
  });
}

/* COLLISION */
function collision(a,b){
  return a.x < b.x+b.w &&
         a.x+a.w > b.x &&
         a.y < b.y+b.h &&
         a.y+a.h > b.y;
}

/* LOOP */
function loop(){
  if(!gameRunning) return;

  frame++;
  let speed = 5 + score*0.2;

  ctx.fillStyle="#222";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  /* SOL */
  ctx.fillStyle="#555";
  ctx.fillRect(0,540,400,60);

  /* NUAGES */
  if(frame % 120 === 0){
    createCloud();
  }

  clouds.forEach((c,i)=>{
    c.x -= 2;

    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.size/2,0,Math.PI*2);
    ctx.fill();

    if(c.x < -50) clouds.splice(i,1);
  });

  /* JOUEUR (dino stylé) */
  player.vy += gravity;
  player.y += player.vy;

  if(player.y >= 500){
    player.y = 500;
    player.jumping = false;
  }

  ctx.drawImage(dinoImg, player.x, player.y, player.w, player.h);

  /* OBSTACLES */
  if(frame % 90 === 0){
    createObstacle();
  }

  obstacles.forEach((o,i)=>{
    o.x -= speed;

    /* cactus */
    ctx.fillStyle="lime";
    ctx.fillRect(o.x,o.y,o.w,o.h);

    ctx.fillRect(o.x-5,o.y+10,5,10);
    ctx.fillRect(o.x+o.w,o.y+15,5,10);

    if(collision(player,o)){
      gameOver();
    }

    if(o.x + o.w < 0){
      obstacles.splice(i,1);
      score++;
      document.getElementById("scoreUI").innerText="Score : "+score;
    }
  });

  requestAnimationFrame(loop);
}

/* GAME OVER */
function gameOver(){
  gameRunning=false;

  document.getElementById("gameOverMenu").style.display="block";

  document.getElementById("finalScore").innerText = score;

  if(score > record){
    record = score;
    localStorage.setItem("dinoRecord", record);
  }

  document.getElementById("finalRecord").innerText = record;
}

/* START */
startGame();
</script>

</body>
</html>
